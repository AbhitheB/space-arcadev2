<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhi's Retro Arcade</title>
    <style>
        body {
            background-color: #0d0d26;
            color: #00ffaa;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            background-image: radial-gradient(circle, #14143c 10%, #0d0d26 90%);
        }
        h1 {
            font-size: 3.5rem;
            color: #ff2a74;
            text-shadow: 0 0 15px #ff2a74, 0 0 30px #ff2a74;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }
        .subtitle {
            color: #00bfff;
            font-size: 1.2rem;
            text-shadow: 0 0 8px #00bfff;
            margin-bottom: 40px;
        }
        .arcade-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .cabinet {
            background: #111125;
            border: 4px solid #00ffaa;
            border-radius: 12px;
            padding: 25px;
            width: 260px;
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.3), inset 0 0 15px rgba(0, 255, 170, 0.1);
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .cabinet:hover {
            transform: translateY(-10px) scale(1.03);
            border-color: #ffdf00;
            box-shadow: 0 0 30px rgba(255, 223, 0, 0.6), inset 0 0 20px rgba(255, 223, 0, 0.2);
        }
        .screen-art {
            background: #000;
            height: 140px;
            border: 2px solid #333;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .cabinet h3 {
            margin: 10px 0;
            font-size: 1.6rem;
            color: #ffdf00;
            text-shadow: 0 0 5px rgba(255, 223, 0, 0.5);
        }
        .cabinet p {
            font-size: 0.9rem;
            color: #b0b0d0;
            line-height: 1.4;
        }
        .locked {
            border-color: #555577;
            box-shadow: none;
            opacity: 0.6;
            cursor: not-allowed;
        }
        .locked:hover {
            transform: none;
            border-color: #555577;
            box-shadow: none;
        }
        .locked .screen-art {
            color: #555577;
        }
        .locked h3 {
            color: #8888aa;
            text-shadow: none;
        }
    </style>
</head>
<body>

    <h1>ABHI'S ARCADE</h1>
    <div class="subtitle">SELECT A MACHINE TO PLAY</div>

    <div class="arcade-container">
        
        <a href="./spacefighter/" class="cabinet">
            <div class="screen-art">🚀</div>
            <h3>STARFIGHTER</h3>
            <p>Pilot a 3D wireframe ship through deep space and blast alien swarms.</p>
        </a>

        <div class="cabinet locked">
            <div class="screen-art">🔒</div>
            <h3>SLOT 02</h3>
            <p>System offline. Game configuration loading soon...</p>
        </div>

        <div class="cabinet locked">
            <div class="screen-art">🔒</div>
            <h3>SLOT 03</h3>
            <p>System offline. Game configuration loading soon...</p>
        </div>

    </div>

</body>
</html>
